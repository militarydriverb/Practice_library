{% extends 'library/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
{% include 'library/header.html' %}
<h2> Вход на сайт </h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Войти</button>
    <a href="{% url 'library:books_list'%}" class="btn btn-secondary">Отмена</a>
    <p class="mt-3">Нет аккаунта? <a href="{% url 'users:register' %}">Зарегистрироваться</a></p>
</form>
{% endblock %}
